<div class="auth-container">
    <div class="auth-image"></div>
    <div class="auth-form-wrapper">
        <a href="#/home" style="color: var(--text-muted); margin-bottom: 1rem; display: inline-block;">
            ← Volver al inicio
        </a>
        <h2>Crear Cuenta</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Únete a la mejor plataforma de mecánicos.</p>

        <div id="register-error"   class="alert-error"   style="display: none;"></div>
        <div id="register-success" class="alert-success" style="display: none;"></div>

        <form id="register-form">
            <div class="input-group">
                <label for="reg-nombre">Nombre completo</label>
                <input type="text" id="reg-nombre" class="input-control"
                    placeholder="Juan Pérez" required>
            </div>
            <div class="input-group">
                <label for="reg-email">Correo electrónico</label>
                <input type="email" id="reg-email" class="input-control"
                    placeholder="correo@ejemplo.com" required>
            </div>
            <div class="input-group">
                <label for="reg-password">Contraseña</label>
                <input type="password" id="reg-password" class="input-control"
                    placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-register"
                style="width: 100%; margin-top: 1rem; padding: 1rem;">
                Registrarse
            </button>
            <p style="margin-top: 2rem; text-align: center; color: var(--text-muted);">
                ¿Ya tienes cuenta?
                <a href="#/login" style="color: var(--primary-color); font-weight: 600;">Inicia Sesión</a>
            </p>
        </form>
    </div>
</div>
